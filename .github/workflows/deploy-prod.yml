name: Deploy Frontend Production

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web Production
        run: |
          flutter build web --release \
            --dart-define=BASE_URL=http://15.228.53.86:5113 \
            --dart-define=API_KEY=${{ secrets.API_KEY_PROD }}

      - name: Prepare EC2 directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/aisend-prod
            sudo chown -R ubuntu:ubuntu /var/www/aisend-prod

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/aisend-prod"
          strip_components: 2
